<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="icon"
      type="image/svg+xml"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='46' cy='46' r='22' stroke='%232563eb' stroke-width='8' fill='none'/><line x1='62' y1='62' x2='88' y2='88' stroke='%232563eb' stroke-width='9' stroke-linecap='round'/></svg>"
    />
    <link rel="stylesheet" href="styles.css" />
    <title>DSA Search Engine</title>
  </head>
  <body>
    <div class="container">
      
      <div class="header-row">
        <div class="brand-spacer"></div>
        <h1>Search 8700+ DSA Problems in Seconds</h1>
        <button id="theme-toggle" class="theme-toggle" aria-label="Toggle Theme">🌙</button>
      </div>

      <div class="hero-content">
        <p class="tagline">
          Instantly find coding challenges across
          <img src="assets/logos/codeforces.png" alt="Codeforces" class="platform-icon" />
          <img src="assets/logos/codechef.png" alt="CodeChef" class="platform-icon" />
          <img src="assets/logos/leetcode.png" alt="LeetCode" class="platform-icon" />
          — all in one place.
        </p>
      </div>

      <form class="search-form" id="search-form">
        <input
          id="query-input"
          class="query-input"
          type="text"
          placeholder="Type a topic, tag, or title..."
          autocomplete="off"
          required
        />
        <button type="submit">Search</button>
      </form>

      <p class="cta">Press enter or click search to see instant matching results.</p>

      <div id="spinner" class="spinner hidden" aria-hidden="true"></div>

      <div id="results" class="results"></div>
    </div>

    <script src="./script.js"></script>
  </body>
</html>
